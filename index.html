<body>
    <div class="game-wrapper">
        <div class="header">
            <div class="score-box" id="scoreDisplay">0</div>

            <div class="speed-control">
                <span class="speed-label">⚡</span>
                <button class="speed-btn" id="speedDown">−</button>
                <span class="speed-value" id="speedDisplay">1.0x</span>
                <button class="speed-btn" id="speedUp">+</button>
            </div>

            <div class="next-label">
                <span style="color:#a9b7d4;">⬇️</span>
                <canvas id="nextCanvas" class="next-canvas" width="140" height="140"></canvas>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="board" width="800" height="1600"></canvas>
        </div>

        <div class="gesture-hint">
            <span><i>⬅️➡️</i> тащи / ←→</span>
            <span><i>⬆️</i> тяни / ↑</span>
            <span><i>⬇️⬇️</i> резко вниз / ↓</span>
            <span><i>👆</i> тап / пробел</span>
        </div>

        <div class="footer">
            <button class="reset-btn" id="resetGame">⟲ Новая игра</button>
            <span class="keyboard-hint">⌨️ стрелки + пробел</span>
        </div>
    </div>

    <script>
        (function () {
            // --------------------------------------------------------------
            // ТЕТРИС 20x40 · динамическая чувствительность + скорость клавиатуры
            // --------------------------------------------------------------

            const COLS = 20;
            const ROWS = 40;
            const BLOCK_SIZE = 40;

            const SHAPES = [
                { matrix: [[1, 1, 1, 1]], color: '#3cc7d6' },
                { matrix: [[1, 1], [1, 1]], color: '#f7d84a' },
                { matrix: [[0, 1, 0], [1, 1, 1]], color: '#b484e0' },
                { matrix: [[0, 1, 1], [1, 1, 0]], color: '#7ec850' },
                { matrix: [[1, 1, 0], [0, 1, 1]], color: '#e4685b' },
                { matrix: [[1, 0, 0], [1, 1, 1]], color: '#f2a35e' },
                { matrix: [[0, 0, 1], [1, 1, 1]], color: '#5b8cff' },
                { matrix: [[1, 1, 1, 1], [1, 1, 1, 1]], color: '#c0a0e0' },
                { matrix: [[0, 1, 1, 0], [0, 1, 1, 0]], color: '#a0d0a0' }
            ];

            let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            let currentPiece = null;
            let nextPiece = null;
            let score = 0;
            let gameOver = false;
            let fallInterval = null;

            // Управление скоростью
            let speedMultiplier = 1.0;
            const MIN_SPEED = 0.5;
            const MAX_SPEED = 3.0;
            const SPEED_STEP = 0.25;
            const BASE_INTERVAL = 500;

            // Для drag-контроля
            let isDragging = false;
            let dragStartX = 0;
            let dragStartY = 0;
            let lastMoveX = 0;
            let lastMoveY = 0;
            let accumulatedRotation = 0;
            let lastRotationTime = 0;
            let dragMode = null;

            const DRAG_THRESHOLD = 20;

            // Базовая чувствительность (при скорости 1.0)
            const BASE_ROTATION_SENSITIVITY = 150;

            // Динамическая чувствительность зависит от скорости
            function getRotationSensitivity() {
                // Чем выше скорость, тем меньше пикселей нужно для поворота
                // При скорости 3.0 нужно всего 50 пикселей
                return Math.max(50, BASE_ROTATION_SENSITIVITY / speedMultiplier);
            }

            const ROTATION_COOLDOWN = 200;

            // Таймер для льготного периода после касания
            let lockDelayTimer = null;
            const LOCK_DELAY = 300;

            // Для клавиатуры
            let keyState = {};
            const KEY_COOLDOWN = 80; // Базовый cooldown
            let lastKeyTime = 0;

            // Интервалы для удержания клавиш
            let horizontalInterval = null;
            let softDropInterval = null;

            // Базовая скорость перемещения при удержании (чем меньше число, тем быстрее)
            const BASE_MOVE_INTERVAL = 100; // мс между перемещениями при скорости 1.0

            function getMoveInterval() {
                // Чем выше скорость, тем быстрее перемещение
                return Math.max(30, BASE_MOVE_INTERVAL / speedMultiplier);
            }

            const boardCanvas = document.getElementById('board');
            const ctx = boardCanvas.getContext('2d');
            const nextCanvas = document.getElementById('nextCanvas');
            const nextCtx = nextCanvas.getContext('2d');
            const scoreSpan = document.getElementById('scoreDisplay');
            const speedDisplay = document.getElementById('speedDisplay');

            function randomPiece() {
                const idx = Math.floor(Math.random() * SHAPES.length);
                const shape = SHAPES[idx];
                return {
                    matrix: shape.matrix.map(row => [...row]),
                    color: shape.color
                };
            }

            function spawnNewPiece() {
                if (!nextPiece) {
                    nextPiece = randomPiece();
                }
                currentPiece = {
                    matrix: nextPiece.matrix.map(row => [...row]),
                    color: nextPiece.color,
                    x: Math.floor((COLS - nextPiece.matrix[0].length) / 2),
                    y: 0
                };
                nextPiece = randomPiece();

                if (collision(currentPiece.matrix, currentPiece.x, currentPiece.y)) {
                    gameOver = true;
                    clearInterval(fallInterval);
                    fallInterval = null;
                }
            }

            function collision(matrix, offsetX, offsetY) {
                for (let r = 0; r < matrix.length; r++) {
                    for (let c = 0; c < matrix[0].length; c++) {
                        if (matrix[r][c] !== 0) {
                            const boardX = offsetX + c;
                            const boardY = offsetY + r;
                            if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) return true;
                            if (boardY >= 0 && board[boardY][boardX] !== 0) return true;
                        }
                    }
                }
                return false;
            }

            function canMoveDown() {
                if (!currentPiece) return false;
                return !collision(currentPiece.matrix, currentPiece.x, currentPiece.y + 1);
            }

            function tryLockPiece() {
                if (!currentPiece || gameOver) return false;

                if (canMoveDown()) {
                    return false;
                }

                if (!lockDelayTimer) {
                    lockDelayTimer = setTimeout(() => {
                        if (!canMoveDown()) {
                            mergePiece();
                            render();
                        }
                        lockDelayTimer = null;
                    }, LOCK_DELAY);
                }
                return true;
            }

            function resetLockTimer() {
                if (lockDelayTimer) {
                    clearTimeout(lockDelayTimer);
                    lockDelayTimer = null;
                }
            }

            function mergePiece() {
                if (!currentPiece) return;

                resetLockTimer();

                for (let r = 0; r < currentPiece.matrix.length; r++) {
                    for (let c = 0; c < currentPiece.matrix[0].length; c++) {
                        if (currentPiece.matrix[r][c] !== 0) {
                            const boardX = currentPiece.x + c;
                            const boardY = currentPiece.y + r;
                            if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                                board[boardY][boardX] = currentPiece.color;
                            }
                        }
                    }
                }
                clearFullRows();
                spawnNewPiece();
            }

            function clearFullRows() {
                let rowsCleared = 0;
                for (let row = ROWS - 1; row >= 0;) {
                    if (board[row].every(cell => cell !== 0)) {
                        for (let r = row; r > 0; r--) {
                            board[r] = [...board[r - 1]];
                        }
                        board[0] = Array(COLS).fill(0);
                        rowsCleared++;
                    } else {
                        row--;
                    }
                }
                if (rowsCleared > 0) {
                    const points = [0, 100, 300, 700, 1500];
                    score += (points[rowsCleared] || 1500) * 2;
                    updateScore();
                }
            }

            function movePiece(dx, dy) {
                if (!currentPiece || gameOver) return false;

                const newX = currentPiece.x + dx;
                const newY = currentPiece.y + dy;

                if (!collision(currentPiece.matrix, newX, newY)) {
                    currentPiece.x = newX;
                    currentPiece.y = newY;
                    render();

                    if (dy === 1) {
                        tryLockPiece();
                    } else {
                        resetLockTimer();
                    }
                    return true;
                } else if (dy === 1) {
                    tryLockPiece();
                    return false;
                }
                return false;
            }

            function rotatePiece() {
                if (!currentPiece || gameOver) return;

                const now = Date.now();
                if (now - lastRotationTime < ROTATION_COOLDOWN) {
                    return;
                }

                const matrix = currentPiece.matrix;
                const rotated = matrix[0].map((_, idx) => matrix.map(row => row[idx]).reverse());

                let offsetX = currentPiece.x;
                if (!collision(rotated, offsetX, currentPiece.y)) {
                    currentPiece.matrix = rotated;
                    lastRotationTime = now;
                    resetLockTimer();
                } else {
                    if (!collision(rotated, offsetX - 1, currentPiece.y)) {
                        currentPiece.matrix = rotated;
                        currentPiece.x -= 1;
                        lastRotationTime = now;
                        resetLockTimer();
                    } else if (!collision(rotated, offsetX + 1, currentPiece.y)) {
                        currentPiece.matrix = rotated;
                        currentPiece.x += 1;
                        lastRotationTime = now;
                        resetLockTimer();
                    } else if (!collision(rotated, offsetX - 2, currentPiece.y)) {
                        currentPiece.matrix = rotated;
                        currentPiece.x -= 2;
                        lastRotationTime = now;
                        resetLockTimer();
                    } else if (!collision(rotated, offsetX + 2, currentPiece.y)) {
                        currentPiece.matrix = rotated;
                        currentPiece.x += 2;
                        lastRotationTime = now;
                        resetLockTimer();
                    }
                }
                render();
            }

            function hardDrop() {
                if (!currentPiece || gameOver) return;

                resetLockTimer();

                while (!collision(currentPiece.matrix, currentPiece.x, currentPiece.y + 1)) {
                    currentPiece.y++;
                }
                mergePiece();
                render();
            }

            function render() {
                ctx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);

                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        const cell = board[row][col];
                        if (cell !== 0) {
                            ctx.fillStyle = cell;
                            ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                            ctx.fillStyle = 'rgba(255,255,255,0.2)';
                            ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE - 4, 4);
                        } else {
                            ctx.strokeStyle = '#20273f';
                            ctx.lineWidth = 1;
                            ctx.strokeRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                        }
                    }
                }

                if (currentPiece && !gameOver) {
                    ctx.fillStyle = currentPiece.color;
                    for (let r = 0; r < currentPiece.matrix.length; r++) {
                        for (let c = 0; c < currentPiece.matrix[0].length; c++) {
                            if (currentPiece.matrix[r][c] !== 0) {
                                const x = (currentPiece.x + c) * BLOCK_SIZE;
                                const y = (currentPiece.y + r) * BLOCK_SIZE;
                                ctx.fillRect(x, y, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                                ctx.fillRect(x, y, BLOCK_SIZE - 8, 4);
                                ctx.fillStyle = currentPiece.color;
                            }
                        }
                    }
                }

                if (gameOver) {
                    ctx.globalAlpha = 0.5;
                    ctx.fillStyle = '#330000';
                    ctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
                    ctx.globalAlpha = 1.0;
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 48px system-ui, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', 400, 800);
                }

                nextCtx.clearRect(0, 0, 140, 140);
                if (nextPiece) {
                    const matrix = nextPiece.matrix;
                    const color = nextPiece.color;
                    const blockSize = 30;
                    const offsetX = (140 - matrix[0].length * blockSize) / 2;
                    const offsetY = (140 - matrix.length * blockSize) / 2;
                    for (let r = 0; r < matrix.length; r++) {
                        for (let c = 0; c < matrix[0].length; c++) {
                            if (matrix[r][c]) {
                                nextCtx.fillStyle = color;
                                nextCtx.fillRect(offsetX + c * blockSize, offsetY + r * blockSize, blockSize - 2, blockSize - 2);
                            }
                        }
                    }
                }
            }

            function updateScore() {
                scoreSpan.innerText = score;
            }

            function updateSpeedDisplay() {
                speedDisplay.innerText = speedMultiplier.toFixed(1) + 'x';
            }

            function updateFallInterval() {
                if (fallInterval) {
                    clearInterval(fallInterval);
                }
                const intervalTime = BASE_INTERVAL / speedMultiplier;
                fallInterval = setInterval(() => {
                    if (!gameOver && currentPiece) {
                        movePiece(0, 1);
                    }
                }, intervalTime);
            }

            function increaseSpeed() {
                if (speedMultiplier < MAX_SPEED) {
                    speedMultiplier = Math.min(speedMultiplier + SPEED_STEP, MAX_SPEED);
                    updateSpeedDisplay();
                    updateFallInterval();

                    // Обновляем интервалы удержания клавиш при изменении скорости
                    if (keyState['ArrowLeft'] || keyState['ArrowRight']) {
                        restartHorizontalInterval();
                    }
                    if (keyState['ArrowDown']) {
                        restartSoftDropInterval();
                    }
                }
            }

            function decreaseSpeed() {
                if (speedMultiplier > MIN_SPEED) {
                    speedMultiplier = Math.max(speedMultiplier - SPEED_STEP, MIN_SPEED);
                    updateSpeedDisplay();
                    updateFallInterval();

                    // Обновляем интервалы удержания клавиш при изменении скорости
                    if (keyState['ArrowLeft'] || keyState['ArrowRight']) {
                        restartHorizontalInterval();
                    }
                    if (keyState['ArrowDown']) {
                        restartSoftDropInterval();
                    }
                }
            }

            function startFallInterval() {
                updateFallInterval();
            }

            function resetGame() {
                if (fallInterval) clearInterval(fallInterval);
                resetLockTimer();

                // Очищаем все интервалы клавиатуры
                clearAllIntervals();

                board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                score = 0;
                gameOver = false;
                keyState = {};
                updateScore();
                nextPiece = randomPiece();
                spawnNewPiece();
                render();
                startFallInterval();
            }

            // --- УЛУЧШЕННОЕ КЛАВИАТУРНОЕ УПРАВЛЕНИЕ С УЧЕТОМ СКОРОСТИ ---

            function clearAllIntervals() {
                if (horizontalInterval) {
                    clearInterval(horizontalInterval);
                    horizontalInterval = null;
                }
                if (softDropInterval) {
                    clearInterval(softDropInterval);
                    softDropInterval = null;
                }
            }

            function restartHorizontalInterval() {
                if (horizontalInterval) {
                    clearInterval(horizontalInterval);
                    horizontalInterval = null;
                }

                if (!currentPiece || gameOver) return;

                const direction = keyState['ArrowLeft'] ? -1 : (keyState['ArrowRight'] ? 1 : 0);
                if (direction !== 0) {
                    // Первое перемещение сразу
                    movePiece(direction, 0);

                    // Затем с интервалом, зависящим от скорости
                    horizontalInterval = setInterval(() => {
                        if (!currentPiece || gameOver || (!keyState['ArrowLeft'] && !keyState['ArrowRight'])) {
                            clearInterval(horizontalInterval);
                            horizontalInterval = null;
                            return;
                        }
                        const currentDirection = keyState['ArrowLeft'] ? -1 : (keyState['ArrowRight'] ? 1 : 0);
                        if (currentDirection !== 0) {
                            movePiece(currentDirection, 0);
                        }
                    }, getMoveInterval());
                }
            }

            function restartSoftDropInterval() {
                if (softDropInterval) {
                    clearInterval(softDropInterval);
                    softDropInterval = null;
                }

                if (!currentPiece || gameOver || !keyState['ArrowDown']) return;

                // Первое падение сразу
                movePiece(0, 1);

                // Затем с интервалом, зависящим от скорости (немного быстрее обычного падения)
                softDropInterval = setInterval(() => {
                    if (!currentPiece || gameOver || !keyState['ArrowDown']) {
                        clearInterval(softDropInterval);
                        softDropInterval = null;
                        return;
                    }
                    movePiece(0, 1);
                }, getMoveInterval() * 0.8); // На 20% быстрее горизонтального перемещения
            }

            function setupKeyboardControls() {
                window.addEventListener('keydown', (e) => {
                    // Игнорируем, если игра неактивна или нажат модификатор
                    if (gameOver || !currentPiece || e.altKey || e.ctrlKey || e.metaKey) return;

                    const key = e.key;

                    // Предотвращаем прокрутку страницы
                    if (key.startsWith('Arrow') || key === ' ') {
                        e.preventDefault();
                    }

                    const now = Date.now();

                    // Обработка одиночных нажатий
                    if (key === 'ArrowUp') {
                        rotatePiece();
                        return;
                    }

                    if (key === ' ' || key === 'Space') {
                        hardDrop();
                        return;
                    }

                    // Для стрелок влево/вправо/вниз используем удержание
                    if (key === 'ArrowLeft' || key === 'ArrowRight' || key === 'ArrowDown') {
                        // Если клавиша уже нажата, игнорируем повторные события
                        if (keyState[key]) return;

                        keyState[key] = true;

                        // Запускаем соответствующий интервал
                        if (key === 'ArrowLeft' || key === 'ArrowRight') {
                            restartHorizontalInterval();
                        } else if (key === 'ArrowDown') {
                            restartSoftDropInterval();
                        }
                    }
                });

                window.addEventListener('keyup', (e) => {
                    const key = e.key;

                    if (key === 'ArrowLeft' || key === 'ArrowRight' || key === 'ArrowDown') {
                        keyState[key] = false;

                        // Перезапускаем горизонтальный интервал, если другая стрелка еще нажата
                        if (key === 'ArrowLeft' || key === 'ArrowRight') {
                            if (keyState['ArrowLeft'] || keyState['ArrowRight']) {
                                restartHorizontalInterval();
                            } else {
                                // Очищаем интервал, если обе клавиши отпущены
                                if (horizontalInterval) {
                                    clearInterval(horizontalInterval);
                                    horizontalInterval = null;
                                }
                            }
                        } else if (key === 'ArrowDown') {
                            if (softDropInterval) {
                                clearInterval(softDropInterval);
                                softDropInterval = null;
                            }
                        }
                    }
                });

                // Очищаем состояние клавиш при потере фокуса
                window.addEventListener('blur', () => {
                    keyState = {};
                    clearAllIntervals();
                });

                // Очищаем при сворачивании окна
                window.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        keyState = {};
                        clearAllIntervals();
                    }
                });
            }

            // Сенсорное управление (без изменений, но с учетом скорости)
            function setupTouchControls() {
                const canvas = boardCanvas;

                let touchStartX = 0, touchStartY = 0;
                let touchStartTime = 0;
                const LONG_TAP_DELAY = 200;

                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    touchStartX = touch.clientX;
                    touchStartY = touch.clientY;
                    touchStartTime = Date.now();

                    isDragging = false;
                    dragStartX = touchStartX;
                    dragStartY = touchStartY;
                    lastMoveX = touchStartX;
                    lastMoveY = touchStartY;
                    accumulatedRotation = 0;
                    dragMode = null;

                    // При касании экрана очищаем состояние клавиатуры
                    keyState = {};
                    clearAllIntervals();
                }, { passive: false });

                canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (!currentPiece || gameOver) return;

                    const touch = e.touches[0];
                    const currentX = touch.clientX;
                    const currentY = touch.clientY;

                    if (!isDragging) {
                        const diffX = Math.abs(currentX - dragStartX);
                        const diffY = Math.abs(currentY - dragStartY);

                        if (diffX > DRAG_THRESHOLD || diffY > DRAG_THRESHOLD) {
                            isDragging = true;
                            if (diffX > diffY) {
                                dragMode = 'horizontal';
                            } else {
                                dragMode = 'vertical';
                            }
                        }
                    }

                    if (isDragging) {
                        const rect = canvas.getBoundingClientRect();
                        const pixelPerBlock = rect.width / COLS;

                        if (dragMode === 'horizontal') {
                            const deltaX = currentX - lastMoveX;
                            const blockDelta = Math.round(deltaX / pixelPerBlock);

                            if (blockDelta !== 0) {
                                movePiece(blockDelta, 0);
                                lastMoveX = currentX;
                            }
                            lastMoveY = currentY;

                        } else if (dragMode === 'vertical') {
                            const deltaY = currentY - lastMoveY;

                            if (deltaY < 0) {
                                accumulatedRotation += Math.abs(deltaY);

                                const currentSensitivity = getRotationSensitivity();
                                if (accumulatedRotation > currentSensitivity) {
                                    rotatePiece();
                                    accumulatedRotation = 0;
                                    lastMoveY = currentY;
                                }
                            } else {
                                accumulatedRotation = 0;
                                lastMoveY = currentY;
                            }
                            lastMoveX = currentX;
                        }
                    }
                }, { passive: false });

                canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    if (!touchStartX) return;

                    const touchEnd = e.changedTouches[0];
                    const diffX = touchEnd.clientX - touchStartX;
                    const diffY = touchEnd.clientY - touchStartY;
                    const timeDiff = Date.now() - touchStartTime;

                    if (isDragging) {
                        if (diffY > 50 && timeDiff < 300) {
                            hardDrop();
                        }
                        isDragging = false;
                        dragMode = null;
                        touchStartX = 0;
                        return;
                    }

                    if (timeDiff >= LONG_TAP_DELAY && Math.abs(diffX) < 20 && Math.abs(diffY) < 20) {
                        hardDrop();
                        touchStartX = 0;
                        return;
                    }

                    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 20) {
                        if (diffX > 0) movePiece(1, 0);
                        else movePiece(-1, 0);
                    }
                    else if (Math.abs(diffY) > 20 && diffY < 0) {
                        rotatePiece();
                    }
                    else if (Math.abs(diffY) > 20 && diffY > 0) {
                        hardDrop();
                    }
                    else if (Math.abs(diffX) < 15 && Math.abs(diffY) < 15) {
                        const rect = canvas.getBoundingClientRect();
                        const touchX = touchEnd.clientX - rect.left;
                        if (touchX < rect.width / 3) {
                            movePiece(-1, 0);
                        } else if (touchX > (rect.width / 3) * 2) {
                            movePiece(1, 0);
                        } else {
                            rotatePiece();
                        }
                    }

                    touchStartX = 0;
                    isDragging = false;
                    dragMode = null;
                }, { passive: false });

                canvas.addEventListener('contextmenu', (e) => e.preventDefault());
            }

            function setupSpeedControls() {
                document.getElementById('speedUp').addEventListener('click', (e) => {
                    e.preventDefault();
                    increaseSpeed();
                });

                document.getElementById('speedDown').addEventListener('click', (e) => {
                    e.preventDefault();
                    decreaseSpeed();
                });
            }

            function initGame() {
                resetGame();
                setupTouchControls();
                setupKeyboardControls();
                setupSpeedControls();
                document.getElementById('resetGame').addEventListener('click', resetGame);
                updateSpeedDisplay();
            }

            window.addEventListener('load', initGame);
        })();
    </script>
</body>
