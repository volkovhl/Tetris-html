    <style>
        /* ========== СБРОС СТИЛЕЙ И ОСНОВНЫЕ НАСТРОЙКИ ========== */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            background: #0b0f1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            touch-action: none;
            padding: 0;
        }

        /* ========== ОСНОВНОЙ КОНТЕЙНЕР ИГРЫ ========== */
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            height: 100dvh;
            max-width: 800px;
            background-image: url('Tetris-fon.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 4px 4px env(safe-area-inset-bottom, 4px) 4px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.6);
            position: relative;
            transition: height 0.1s ease;
            will-change: height;
        }

        /* Верхняя панель */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 4px;
            padding: 6px 8px;
            color: #a9b7d4;
            font-weight: 600;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            background: rgba(10, 14, 23, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            min-height: 48px;
        }

        .score-box {
            background: #0e121f;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 1rem;
            color: #ffe484;
            box-shadow: inset 0 3px 6px #00000055;
            white-space: nowrap;
        }

        /* Управление скоростью */
        .speed-control {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #0e121f;
            padding: 4px 8px;
            border-radius: 30px;
            box-shadow: inset 0 3px 6px #00000055;
        }

        .speed-label {
            display: flex;
            align-items: center;
            gap: 2px;
            color: #7b88aa;
            font-size: 0.8rem;
        }

        .speed-btn {
            background: #323d5e;
            border: none;
            color: white;
            font-size: 1rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 0 #1b2135;
            transition: 0.08s linear;
            touch-action: manipulation;
        }

        .speed-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .speed-value {
            color: #ffe484;
            font-size: 0.9rem;
            min-width: 45px;
            text-align: center;
        }

            text-decoration: none;
            border-radius: 50%;

            position: relative;
            overflow: hidden;
            flex-shrink: 0;

        }

            transform: translateY(0) scale(1);

            position: relative;
            z-index: 2;

        /* Предпросмотр следующей фигуры */
        .next-label {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #0e121f;
            padding: 4px 10px;
            border-radius: 30px;
            flex-shrink: 0;
        }

        .next-canvas {
            background: #0e121f;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            box-shadow: inset 0 3px 6px #00000055;
        }

        /* Контейнер игрового поля */
        .canvas-container {
            flex: 1 1 auto;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            margin-bottom: 2px;

        }

        canvas#board {
            display: block;
            width: auto;
            height: 100%;
            max-width: 100%;
            aspect-ratio: 1 / 2;
            background: rgba(10, 13, 22, 0.85);
            border-radius: 16px;
            box-shadow: 0 0 0 2px #303754, inset 0 0 0 1px #5f6f9e;
            image-rendering: crisp-edges;
            touch-action: none;
        }

        /* Подсказки по управлению */
        .gesture-hint {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 2px;
            margin-bottom: 2px;
            color: #7b88aa;
            font-size: 0.6rem;
            font-weight: 500;
            background: rgba(37, 44, 65, 0.8);
            backdrop-filter: blur(5px);
            padding: 6px 0;
            border-radius: 20px;
            border: 1px solid #3e4a6b;
            flex-shrink: 0;
        }

        .gesture-hint span {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .gesture-hint i {
            font-size: 0.9rem;
            filter: drop-shadow(0 2px 2px black);
        }

        /* Кнопка переключения свайпа вниз */
        .swipe-toggle {
            background: #323d5e;
            border: none;
            color: white;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 2px 0 #1b2135;
            transition: 0.08s linear;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
            min-width: 60px;
            justify-content: center;
        }

        .swipe-toggle.inactive {
            background: rgba(76, 175, 80, 0.3);
            /* Зеленый с прозрачностью 0.8 */
            box-shadow: 0 2px 0 #2d6e30;

        }

        .swipe-toggle.active {
            background: rgba(244, 67, 54, 0.3);
            /* Красный с прозрачностью 0.8 */
            box-shadow: 0 2px 0 #aa2e25;

        }

        .swipe-toggle i {
            font-size: 0.8rem;
        }

        .swipe-toggle:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        /* Кнопка лазерного пальца */
        .laser-toggle {
            background: #323d5e;
            border: none;
            color: white;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 2px 0 #1b2135;
            transition: 0.08s linear;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
            min-width: 60px;
            justify-content: center;
        }

        .laser-toggle.active {
            background: rgba(255, 68, 68, 0.3);
            /* ff4444 = rgb(255,68,68) с прозрачностью 0.7 */
            box-shadow: 0 2px 0 #aa2222;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .laser-toggle.inactive {
            background: #555555;
            box-shadow: 0 2px 0 #333333;
        }

        .laser-toggle i {
            font-size: 0.8rem;
        }

        .laser-toggle:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        /* Нижняя панель кнопок */
        .footer {
            margin-top: 2px;
            margin-bottom: 0;
            display: flex;
            gap: 80px;
            flex-shrink: 0;
            width: 100%;
            justify-content: center;
            padding: 6px env(safe-area-inset-bottom, 8px);
            background: transparent;
            flex-wrap: wrap;
        }

        .reset-btn,
        .ai-btn {
            background: rgba(50, 61, 94, 0.9);
            backdrop-filter: blur(4px);
            border: none;
            color: white;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            box-shadow: 0 4px 0 #1b2135;
            transition: 0.08s linear;
            touch-action: manipulation;
            cursor: pointer;
            min-width: 110px;
            flex: 0 1 auto;
            margin: 0 10px;
            /* добавить горизонтальные отступы */
        }

        .ai-btn {
            background: rgba(74, 61, 122, 0.9);
            box-shadow: 0 4px 0 #2a1f4a;
        }

        .reset-btn:active,
        .ai-btn:active,
        .swipe-toggle:active,
        .laser-toggle:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .keyboard-hint {
            display: none;
        }

        /* Эффект лазера при уничтожении */
        @keyframes laserPulse {
            0% {
                opacity: 0.3;
                transform: scale(0.95);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }

            100% {
                opacity: 0.3;
                transform: scale(0.95);
            }
        }

        .laser-active-indicator {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            margin-left: -33px;
            /* Сдвиг влево на 50px */
            background: rgba(255, 68, 68, 0.3);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            animation: laserPulse 1s infinite;
            z-index: 10;
            pointer-events: none;
            backdrop-filter: blur(4px);
            border: 1px solid #ff8888;
        }

        /* Стили для подсказок ПК */
        .pc-hint {
            display: none;
        }

        @media (hover: hover) and (pointer: fine) {
            .pc-hint {
                display: flex;
            }
        }

        @media (max-height: 700px) {

            }

            .reset-btn,

                padding: 6px 12px;

            }

            :root {

        }

        @media (max-width: 600px) {
            .header {
                padding: 4px 6px;
            }

            .score-box {

            }

            }

            :root {

                --yt-logo-size: 16px;
                --yt-icon-size: 11px;
            }
        }

        @media (max-height: 600px) {
            .gesture-hint {
                display: none;

            }

            .footer {

            }

        @media (prefers-color-scheme: light) {
            .game-wrapper {
                background-image: linear-gradient(rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.1)), url('Tetris-fon.webp');
            }

            .header,
            .gesture-hint {
                background: rgba(20, 30, 50, 0.8);
            }
        }

        /* Для устройств с большим safe-area */
        @supports (padding: max(0px)) {
            .game-wrapper {
                padding-left: max(4px, env(safe-area-inset-left));
                padding-right: max(4px, env(safe-area-inset-right));
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }

            .footer {
                padding-bottom: max(6px, env(safe-area-inset-bottom));
            }
        }

        /* Режим высокой контрастности */
        @media (prefers-contrast: high) {
            canvas#board {
                box-shadow: 0 0 0 3px #ffffff, 0 0 0 6px #000000;
            }

            .reset-btn,
            .ai-btn {
                border: 2px solid white;
            }
        }

        /* Убираем анимацию для пользователей, кто предпочитает уменьшить движение */
        @media (prefers-reduced-motion: reduce) {
            .game-wrapper * {
                transition: none;
            }
        }

        /* Фикс для очень узких экранов */
        @media (max-width: 350px) {
            .header {
                flex-wrap: wrap;
                gap: 2px;
                justify-content: center;
                border-radius: 20px;
            }

            .speed-control {
                order: 1;
            }

            .next-label {
                order: 2;
            }

            .score-box {
                order: 3;
                width: 100%;
                text-align: center;
            }

            #youtubeButtonContainer {
                order: 4;
            }
        }

        /* Печать */
        @media print {
            .game-wrapper {
                background: white;
                height: auto;
            }

            .gesture-hint,
            .footer,
            .header {
                display: none;
            }

            canvas#board {
                box-shadow: none;
                border: 1px solid black;
            }
        }
    </style>
</head>

<body>
    <div class="game-wrapper">
        <!-- Верхняя панель: счет, скорость, YouTube, предпросмотр -->

                <i>⬇️</i> <span id="swipeToggleText">выкл</span>
            </button>
            <button class="laser-toggle inactive" id="laserToggleBtn" title="Вкл/Выкл лазерный палец (уничтожай блоки)">
                <i>▄︻テ══━一💥</i><span id="laserToggleText"></span>
            </button>
