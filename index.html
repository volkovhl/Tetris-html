    <!-- Индикатор активного лазера -->
    <div id="laserIndicator" class="laser-active-indicator" style="display: none;">ЛАЗЕР</div>

    <script>
        (function () {
            (function protectYouTubeLinks() {
                const YT_CONFIG = {
                    channel: {
                        full: 'aHR0cHM6Ly93d3cueW91dHViZS5jb20vQFBhdmVsX1ZvbGtvdj9zdWJfY29uZmlybWF0aW9uPTE='
                    },
                    checkInterval: 1000
                };

                let protectionActive = true;

                function getYouTubeChannelUrl() {
                    return atob(YT_CONFIG.channel.full);
                }

                function restoreYouTubeLink() {
                    const container = document.getElementById('youtubeButtonContainer');

                    if (container) {
                        const channelBtn = document.getElementById('youtubeChannelBtn');
                        if (!channelBtn || !channelBtn.parentElement || channelBtn.parentElement.tagName !== 'A' || channelBtn.href !== getYouTubeChannelUrl()) {
                            container.innerHTML = '';
                            const newChannelBtn = document.createElement('a');
                            newChannelBtn.href = getYouTubeChannelUrl();
                            newChannelBtn.target = '_blank';
                            newChannelBtn.rel = 'noopener noreferrer';
                            newChannelBtn.className = 'youtube-button';
                            newChannelBtn.id = 'youtubeChannelBtn';
                            newChannelBtn.title = 'Дела Техники';
                            newChannelBtn.innerHTML = `<span class="youtube-icon">▶</span>`;
                            container.appendChild(newChannelBtn);
                        }
                    }
                }

                function startProtection() {
                    setTimeout(restoreYouTubeLink, 100);

                    setInterval(function () {
                        if (!protectionActive) return;
                        restoreYouTubeLink();
                    }, YT_CONFIG.checkInterval);

                    try {
                        const originalGetElementById = document.getElementById;
                        document.getElementById = function (id) {
                            if (id === 'youtubeChannelBtn') {
                                const element = originalGetElementById.call(this, id);
                                if (!element) {
                                    setTimeout(restoreYouTubeLink, 10);
                                }
                                return element;
                            }
                            return originalGetElementById.call(this, id);
                        };
                    } catch (e) {
                        console.log('Protection active');
                    }
                }

                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', startProtection);
                } else {
                    startProtection();
                }
            })();

            // ==========================================================================
            // ТЕТРИС 20x40 · Оптимизированная версия с AI-ботом, свайпом и ЛАЗЕРНЫМ ПАЛЬЦЕМ
            // ==========================================================================

            // Размер игрового поля
            const COLS = 20;
            const ROWS = 40;
            const BLOCK_SIZE = 40;

            // Определение форм фигур (тетрамино)
            const SHAPES = [
                { matrix: [[1, 1, 1, 1]], color: '#3cc7d6' },     // I - голубой
                { matrix: [[1, 1], [1, 1]], color: '#f7d84a' },   // O - желтый
                { matrix: [[0, 1, 0], [1, 1, 1]], color: '#b484e0' }, // T - фиолетовый
                { matrix: [[0, 1, 1], [1, 1, 0]], color: '#7ec850' }, // S - зеленый
                { matrix: [[1, 1, 0], [0, 1, 1]], color: '#e4685b' }, // Z - красный
                { matrix: [[1, 0, 0], [1, 1, 1]], color: '#f2a35e' }, // L - оранжевый
                { matrix: [[0, 0, 1], [1, 1, 1]], color: '#5b8cff' }  // J - синий
            ];

            // Состояние игры
            let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            let currentPiece = null;
            let nextPiece = null;
            let score = 0;
            let gameOver = false;
            let gameStarted = false;
            let fallInterval = null;

            // AI режим
            let aiMode = false;
            let aiInterval = null;
            let aiThinking = false;

            // Управление скоростью
            let speedMultiplier = 1.0;
            const MIN_SPEED = 0.5;
            const MAX_SPEED = 10.0;
            const SPEED_STEP = 0.5;
            const BASE_INTERVAL = 500;
            const COMFORT_SPEED = 2.0;

            // Переключатель свайпа вниз (hard drop)
            let swipeDownEnabled = false;
            const swipeToggleBtn = document.getElementById('swipeToggleBtn');
            const swipeToggleText = document.getElementById('swipeToggleText');

            // НОВОЕ: Переключатель лазерного пальца
            let laserModeEnabled = false;
            const laserToggleBtn = document.getElementById('laserToggleBtn');
            const laserToggleText = document.getElementById('laserToggleText');
            const laserIndicator = document.getElementById('laserIndicator');

            // НОВОЕ: Переменные для лазерного режима
            let isLaserActive = false;
            let laserInterval = null;
            let lastLaserX = -1;
            let lastLaserY = -1;
            const LASER_FIRE_RATE = 50; // миллисекунд между выстрелами (20 выстрелов в секунду)
            const LASER_RADIUS = 2; // радиус поражения (сколько клеток вниз уничтожается за раз)

            // НОВОЕ: Переменные для лазера на v + мышь
            let laserCursorX = Math.floor(COLS / 2);
            let laserCursorY = Math.floor(ROWS / 2);
            let lastLaserFireTime = 0;
            let vPressed = false;
            let laserActiveByV = false;
            let mouseLaserActive = false;

            // Drag-управление
            let isDragging = false;
            let dragStartX = 0, dragStartY = 0;
            let lastMoveX = 0, lastMoveY = 0;
            let accumulatedRotation = 0;
            let lastRotationTime = 0;
            let dragMode = null;

            const DRAG_THRESHOLD = 20;
            const BASE_ROTATION_SENSITIVITY = 150;
            const ROTATION_COOLDOWN = 200;
            const LOCK_DELAY = 300;
            const BASE_MOVE_INTERVAL = 100;

            // Клавиатурное управление
            let keyState = {};
            let horizontalInterval = null;
            let softDropInterval = null;
            let isTouchDevice = false;

            // Элементы DOM
            const boardCanvas = document.getElementById('board');
            const ctx = boardCanvas.getContext('2d');
            const nextCanvas = document.getElementById('nextCanvas');
            const nextCtx = nextCanvas.getContext('2d');
            const scoreSpan = document.getElementById('scoreDisplay');
            const speedDisplay = document.getElementById('speedDisplay');
            const resetBtn = document.getElementById('resetGame');
            const aiBtn = document.getElementById('aiPlay');

            // Детектим Яндекс.Браузер
            const isYandexBrowser = navigator.userAgent.toLowerCase().includes('yandex');

            // Функция для переключения свайпа вниз
            function toggleSwipeDown() {
                swipeDownEnabled = !swipeDownEnabled;
                updateSwipeToggleButton();
            }

            function updateSwipeToggleButton() {
                if (swipeToggleBtn) {
                    swipeToggleBtn.classList.remove('active', 'inactive');
                    swipeToggleBtn.classList.add(swipeDownEnabled ? 'active' : 'inactive');
                    swipeToggleText.textContent = swipeDownEnabled ? 'вкл' : 'выкл';
                }
            }

            // НОВОЕ: Функции для лазерного режима
            function toggleLaserMode() {
                if (aiMode) {
                    alert('Выключите 🤖 перед использованием лазера!');
                    return;
                }
                laserModeEnabled = !laserModeEnabled;
                updateLaserToggleButton();

                // Сбрасываем флаги v-режима
                if (!laserModeEnabled) {
                    laserActiveByV = false;
                    altPressed = false;
                    mouseLaserActive = false;
                }

                // Показываем/скрываем индикатор
                if (laserIndicator) {
                    laserIndicator.style.display = laserModeEnabled ? 'block' : 'none';
                }

                // Если выключаем лазер, деактивируем его
                if (!laserModeEnabled) {
                    deactivateLaser();
                }
            }

            function updateLaserToggleButton() {
                if (laserToggleBtn) {
                    laserToggleBtn.classList.remove('active', 'inactive');
                    laserToggleBtn.classList.add(laserModeEnabled ? 'active' : 'inactive');
                }
            }

            // НОВОЕ: Активация лазера
            function activateLaser(x, y) {
                if (!laserModeEnabled || aiMode || !gameStarted || gameOver) return;

                // Получаем координаты клетки на доске
                const rect = boardCanvas.getBoundingClientRect();
                const scaleX = boardCanvas.width / rect.width;
                const scaleY = boardCanvas.height / rect.height;

                const canvasX = (x - rect.left) * scaleX;
                const canvasY = (y - rect.top) * scaleY;

                const col = Math.floor(canvasX / BLOCK_SIZE);
                const row = Math.floor(canvasY / BLOCK_SIZE);

                // Проверяем, что координаты в пределах доски
                if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
                    // Запоминаем позицию для интервала
                    lastLaserX = col;
                    lastLaserY = row;

                    if (!isLaserActive) {
                        isLaserActive = true;

                        // Немедленно делаем первый выстрел
                        fireLaser(col, row);

                        // Запускаем интервал для автоматической стрельбы
                        if (laserInterval) clearInterval(laserInterval);
                        laserInterval = setInterval(() => {
                            if (isLaserActive && lastLaserX !== -1 && lastLaserY !== -1) {
                                fireLaser(lastLaserX, lastLaserY);
                            }
                        }, LASER_FIRE_RATE);
                    }
                }
            }

            // НОВОЕ: Деактивация лазера
            function deactivateLaser() {
                isLaserActive = false;
                lastLaserX = -1;
                lastLaserY = -1;
                if (laserInterval) {
                    clearInterval(laserInterval);
                    laserInterval = null;
                }
            }

            // НОВОЕ: Обновление позиции лазера при движении пальца
            function updateLaserPosition(x, y) {
                if (!laserModeEnabled || !isLaserActive || aiMode || !gameStarted || gameOver) return;

                const rect = boardCanvas.getBoundingClientRect();
                const scaleX = boardCanvas.width / rect.width;
                const scaleY = boardCanvas.height / rect.height;

                const canvasX = (x - rect.left) * scaleX;
                const canvasY = (y - rect.top) * scaleY;

                const col = Math.floor(canvasX / BLOCK_SIZE);
                const row = Math.floor(canvasY / BLOCK_SIZE);

                if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
                    lastLaserX = col;
                    lastLaserY = row;
                }
            }

            // НОВОЕ: Функция выстрела лазером
            function fireLaser(col, row) {
                if (!laserModeEnabled || aiMode || !gameStarted || gameOver) return;

                // Проверяем скорострельность
                const now = Date.now();
                if (now - lastLaserFireTime < LASER_FIRE_RATE) return;
                lastLaserFireTime = now;

                let blocksDestroyed = 0;

                // Уничтожаем блоки в радиусе поражения вниз от точки касания
                for (let r = row; r < Math.min(row + LASER_RADIUS + 1, ROWS); r++) {
                    if (board[r][col] !== 0) {
                        board[r][col] = 0;
                        blocksDestroyed++;
                    }
                }

                // Если уничтожили блоки, добавляем очки (немного, чтобы не было читерства)
                if (blocksDestroyed > 0) {
                    score += blocksDestroyed * 5;
                    updateScore();

                    // Проверяем, не образовались ли пустые строки, которые нужно убрать
                    checkAndShiftBlocks(col);
                }

                render();
            }

            // НОВОЕ: Проверка и смещение блоков после уничтожения
            function checkAndShiftBlocks(col) {
                let changed = false;

                // Проходим снизу вверх
                for (let row = ROWS - 1; row > 0; row--) {
                    if (board[row][col] === 0) {
                        // Ищем первый блок выше
                        for (let r = row - 1; r >= 0; r--) {
                            if (board[r][col] !== 0) {
                                // Смещаем блок вниз
                                board[row][col] = board[r][col];
                                board[r][col] = 0;
                                changed = true;
                                break;
                            }
                        }
                    }
                }

                // Если были изменения, проверяем полные строки
                if (changed) {
                    checkFullRows();
                }
            }

            // НОВОЕ: Проверка полных строк после лазера
            function checkFullRows() {
                let rowsCleared = 0;
                for (let row = ROWS - 1; row >= 0;) {
                    if (board[row].every(cell => cell !== 0)) {
                        for (let r = row; r > 0; r--) {
                            board[r] = [...board[r - 1]];
                        }
                        board[0] = Array(COLS).fill(0);
                        rowsCleared++;
                    } else {
                        row--;
                    }
                }

                if (rowsCleared > 0) {
                    const points = [0, 100, 300, 700, 1500];
                    score += (points[rowsCleared] || 1500);
                    updateScore();
                }
            }

            // Функция для получения реальной высоты окна
            function getRealViewportHeight() {
                if (isYandexBrowser) {
                    return window.innerHeight - 10;
                }
                return window.innerHeight;
            }

            // Функция для корректировки размера canvas под контейнер
            function resizeCanvas() {
                const container = document.querySelector('.canvas-container');
                const gameWrapper = document.querySelector('.game-wrapper');
                if (!container || !gameWrapper) return;

                const viewportHeight = getRealViewportHeight();
                gameWrapper.style.height = viewportHeight + 'px';

                const containerWidth = container.clientWidth;
                const containerHeight = container.clientHeight;

                let canvasWidth = containerWidth;
                let canvasHeight = canvasWidth * 2;

                if (canvasHeight > containerHeight) {
                    canvasHeight = containerHeight;
                    canvasWidth = canvasHeight / 2;
                }

                boardCanvas.style.width = `${canvasWidth}px`;
                boardCanvas.style.height = `${canvasHeight}px`;
            }

            // Специальная функция для Яндекс.Браузера
            function yandexBrowserFix() {
                if (!isYandexBrowser) return;

                setInterval(() => {
                    const viewportHeight = getRealViewportHeight();
                    const gameWrapper = document.querySelector('.game-wrapper');
                    if (gameWrapper && parseInt(gameWrapper.style.height) !== viewportHeight) {
                        gameWrapper.style.height = viewportHeight + 'px';
                        resizeCanvas();
                    }
                }, 100);
            }

            // Вспомогательные функции
            function rotateMatrix(matrix) {
                return matrix[0].map((_, idx) => matrix.map(row => row[idx]).reverse());
            }

            function randomPiece() {
                const idx = Math.floor(Math.random() * SHAPES.length);
                const shape = SHAPES[idx];
                return {
                    matrix: shape.matrix.map(row => [...row]),
                    color: shape.color
                };
            }

            function collision(matrix, offsetX, offsetY) {
                for (let r = 0; r < matrix.length; r++) {
                    for (let c = 0; c < matrix[0].length; c++) {
                        if (matrix[r][c] !== 0) {
                            const boardX = offsetX + c;
                            const boardY = offsetY + r;
                            if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) return true;
                            if (boardY >= 0 && board[boardY][boardX] !== 0) return true;
                        }
                    }
                }
                return false;
            }

            function canMoveDown() {
                if (!currentPiece || !gameStarted) return false;
                return !collision(currentPiece.matrix, currentPiece.x, currentPiece.y + 1);
            }

            let lockDelayTimer = null;

            function resetLockTimer() {
                if (lockDelayTimer) {
                    clearTimeout(lockDelayTimer);
                    lockDelayTimer = null;
                }
            }

            function tryLockPiece() {
                if (!currentPiece || gameOver || !gameStarted) return false;
                if (canMoveDown()) return false;

                if (!lockDelayTimer) {
                    lockDelayTimer = setTimeout(() => {
                        if (!canMoveDown()) {
                            mergePiece();
                            render();
                        }
                        lockDelayTimer = null;
                    }, LOCK_DELAY);
                }
                return true;
            }

            function mergePiece() {
                if (!currentPiece || !gameStarted) return;

                resetLockTimer();

                for (let r = 0; r < currentPiece.matrix.length; r++) {
                    for (let c = 0; c < currentPiece.matrix[0].length; c++) {
                        if (currentPiece.matrix[r][c] !== 0) {
                            const boardX = currentPiece.x + c;
                            const boardY = currentPiece.y + r;
                            if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                                board[boardY][boardX] = currentPiece.color;
                            }
                        }
                    }
                }
                clearFullRows();
                spawnNewPiece();
            }

            function clearFullRows() {
                let rowsCleared = 0;
                for (let row = ROWS - 1; row >= 0;) {
                    if (board[row].every(cell => cell !== 0)) {
                        for (let r = row; r > 0; r--) {
                            board[r] = [...board[r - 1]];
                        }
                        board[0] = Array(COLS).fill(0);
                        rowsCleared++;
                    } else {
                        row--;
                    }
                }
                if (rowsCleared > 0) {
                    const points = [0, 100, 300, 700, 1500];
                    score += (points[rowsCleared] || 1500) * 2;
                    updateScore();
                }
            }

            function movePiece(dx, dy) {
                if (!currentPiece || gameOver || !gameStarted) return false;

                const newX = currentPiece.x + dx;
                const newY = currentPiece.y + dy;

                if (!collision(currentPiece.matrix, newX, newY)) {
                    currentPiece.x = newX;
                    currentPiece.y = newY;
                    render();

                    if (dy === 1) {
                        tryLockPiece();
                    } else {
                        resetLockTimer();
                    }
                    return true;
                } else if (dy === 1) {
                    tryLockPiece();
                }
                return false;
            }

            function rotatePiecePC() {
                if (!currentPiece || gameOver || !gameStarted) return;

                const matrix = currentPiece.matrix;
                const rotated = rotateMatrix(matrix);
                let offsetX = currentPiece.x;

                if (!collision(rotated, offsetX, currentPiece.y)) {
                    currentPiece.matrix = rotated;
                    resetLockTimer();
                } else if (!collision(rotated, offsetX - 1, currentPiece.y)) {
                    currentPiece.matrix = rotated;
                    currentPiece.x -= 1;
                    resetLockTimer();
                } else if (!collision(rotated, offsetX + 1, currentPiece.y)) {
                    currentPiece.matrix = rotated;
                    currentPiece.x += 1;
                    resetLockTimer();
                } else if (!collision(rotated, offsetX - 2, currentPiece.y)) {
                    currentPiece.matrix = rotated;
                    currentPiece.x -= 2;
                    resetLockTimer();
                } else if (!collision(rotated, offsetX + 2, currentPiece.y)) {
                    currentPiece.matrix = rotated;
                    currentPiece.x += 2;
                    resetLockTimer();
                }
                render();
            }

            function rotatePieceMobile() {
                if (!currentPiece || gameOver || !gameStarted) return;

                const now = Date.now();
                if (now - lastRotationTime < ROTATION_COOLDOWN) return;

                const matrix = currentPiece.matrix;
                const rotated = rotateMatrix(matrix);
                let offsetX = currentPiece.x;

                if (!collision(rotated, offsetX, currentPiece.y)) {
                    currentPiece.matrix = rotated;
                    lastRotationTime = now;
                    resetLockTimer();
                } else if (!collision(rotated, offsetX - 1, currentPiece.y)) {
                    currentPiece.matrix = rotated;
                    currentPiece.x -= 1;
                    lastRotationTime = now;
                    resetLockTimer();
                } else if (!collision(rotated, offsetX + 1, currentPiece.y)) {
                    currentPiece.matrix = rotated;
                    currentPiece.x += 1;
                    lastRotationTime = now;
                    resetLockTimer();
                } else if (!collision(rotated, offsetX - 2, currentPiece.y)) {
                    currentPiece.matrix = rotated;
                    currentPiece.x -= 2;
                    lastRotationTime = now;
                    resetLockTimer();
                } else if (!collision(rotated, offsetX + 2, currentPiece.y)) {
                    currentPiece.matrix = rotated;
                    currentPiece.x += 2;
                    lastRotationTime = now;
                    resetLockTimer();
                }
                render();
            }

            function rotatePiece() {
                if (aiMode) return;
                if (isTouchDevice) {
                    rotatePieceMobile();
                } else {
                    rotatePiecePC();
                }
            }

            function hardDrop() {
                if (aiMode) return;
                if (!currentPiece || gameOver || !gameStarted) return;

                resetLockTimer();

                while (!collision(currentPiece.matrix, currentPiece.x, currentPiece.y + 1)) {
                    currentPiece.y++;
                }
                mergePiece();
                render();
            }

            function spawnNewPiece() {
                if (!gameStarted) return;

                if (!nextPiece) {
                    nextPiece = randomPiece();
                }
                currentPiece = {
                    matrix: nextPiece.matrix.map(row => [...row]),
                    color: nextPiece.color,
                    x: Math.floor((COLS - nextPiece.matrix[0].length) / 2),
                    y: 0
                };
                nextPiece = randomPiece();

                if (collision(currentPiece.matrix, currentPiece.x, currentPiece.y)) {
                    gameOver = true;
                    gameStarted = false;
                    aiMode = false;
                    clearInterval(fallInterval);
                    fallInterval = null;
                    stopAIMode();
                    updateButtonText();
                    deactivateLaser(); // Выключаем лазер при Game Over
                }
                render();
            }

            function updateScore() {
                scoreSpan.innerText = score;
            }

            function updateSpeedDisplay() {
                speedDisplay.innerText = speedMultiplier.toFixed(1) + 'x';
            }

            function updateFallInterval() {
                if (fallInterval) {
                    clearInterval(fallInterval);
                    fallInterval = null;
                }

                if (!gameStarted || gameOver) return;

                const intervalTime = BASE_INTERVAL / speedMultiplier;
                fallInterval = setInterval(() => {
                    if (!gameOver && gameStarted && currentPiece) {
                        movePiece(0, 1);
                    }
                }, intervalTime);
            }

            function increaseSpeed() {
                if (speedMultiplier < MAX_SPEED) {
                    speedMultiplier = Math.min(speedMultiplier + SPEED_STEP, MAX_SPEED);
                    updateSpeedDisplay();
                    updateFallInterval();
                }
            }

            function decreaseSpeed() {
                if (speedMultiplier > MIN_SPEED) {
                    speedMultiplier = Math.max(speedMultiplier - SPEED_STEP, MIN_SPEED);
                    updateSpeedDisplay();
                    updateFallInterval();
                }
            }

            function updateButtonText() {
                if (!gameStarted && !gameOver) {
                    resetBtn.innerHTML = '▶ Новая игра';
                    aiBtn.innerHTML = '🤖';
                } else if (gameStarted && !gameOver) {
                    if (aiMode) {
                        resetBtn.innerHTML = '⏹ Остановить';
                        aiBtn.innerHTML = '🤖 играет...';
                    } else {
                        resetBtn.innerHTML = '⏹ Сброс';
                        aiBtn.innerHTML = '🤖 Play';
                    }
                } else if (gameOver) {
                    resetBtn.innerHTML = '↻ Играть снова';
                    aiBtn.innerHTML = '🤖 Play';
                }
            }

            function startGame() {
                if (gameStarted && !gameOver) return;

                stopAIMode();
                deactivateLaser(); // Выключаем лазер при старте

                board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                score = 0;
                gameOver = false;
                gameStarted = true;
                aiMode = false;
                keyState = {};

                clearAllIntervals();
                resetLockTimer();

                updateScore();
                nextPiece = randomPiece();
                spawnNewPiece();
                updateFallInterval();
                updateButtonText();
                render();
            }

            function resetGame() {
                stopAIMode();
                deactivateLaser(); // Выключаем лазер при сбросе

                if (fallInterval) clearInterval(fallInterval);
                resetLockTimer();
                clearAllIntervals();

                board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                score = 0;
                gameOver = false;
                gameStarted = false;
                aiMode = false;
                keyState = {};

                updateScore();
                nextPiece = null;
                currentPiece = null;
                updateButtonText();
                render();
            }

            // AI функции
            function findBestMove() {
                if (!currentPiece) return null;

                let bestMove = {
                    rotation: 0,
                    x: currentPiece.x,
                    score: -Infinity
                };

                for (let rot = 0; rot < 4; rot++) {
                    let testMatrix = currentPiece.matrix;
                    for (let r = 0; r < rot; r++) {
                        testMatrix = rotateMatrix(testMatrix);
                    }

                    let minX = 0;
                    let maxX = COLS - testMatrix[0].length;

                    for (let testX = minX; testX <= maxX; testX++) {
                        if (collision(testMatrix, testX, currentPiece.y)) continue;

                        let testY = currentPiece.y;
                        while (!collision(testMatrix, testX, testY + 1)) {
                            testY++;
                        }

                        let moveScore = evaluatePosition(testMatrix, testX, testY, board);

                        if (moveScore > bestMove.score) {
                            bestMove = {
                                rotation: rot,
                                x: testX,
                                score: moveScore
                            };
                        }
                    }
                }

                return bestMove;
            }

            function evaluatePosition(matrix, x, y, boardState) {
                let score = 0;
                let testBoard = JSON.parse(JSON.stringify(boardState));

                for (let r = 0; r < matrix.length; r++) {
                    for (let c = 0; c < matrix[0].length; c++) {
                        if (matrix[r][c]) {
                            if (y + r >= 0 && y + r < ROWS && x + c >= 0 && x + c < COLS) {
                                testBoard[y + r][x + c] = 1;
                            }
                        }
                    }
                }

                score += (ROWS - y) * 5;

                let rowsFilled = 0;
                for (let row = 0; row < ROWS; row++) {
                    if (testBoard[row].every(cell => cell !== 0)) {
                        rowsFilled++;
                    }
                }
                score += rowsFilled * 1000;

                let holes = 0;
                for (let col = 0; col < COLS; col++) {
                    let blockFound = false;
                    for (let row = 0; row < ROWS; row++) {
                        if (testBoard[row][col] !== 0) {
                            blockFound = true;
                        } else if (blockFound) {
                            holes++;
                        }
                    }
                }
                score -= holes * 30;

                let maxHeight = 0;
                let totalHeight = 0;
                for (let col = 0; col < COLS; col++) {
                    let height = 0;
                    for (let row = 0; row < ROWS; row++) {
                        if (testBoard[row][col] !== 0) {
                            height = ROWS - row;
                            break;
                        }
                    }
                    totalHeight += height;
                    maxHeight = Math.max(maxHeight, height);
                }
                score -= totalHeight * 2;
                score -= maxHeight * 10;

                let heights = [];
                for (let col = 0; col < COLS; col++) {
                    let height = 0;
                    for (let row = 0; row < ROWS; row++) {
                        if (testBoard[row][col] !== 0) {
                            height = ROWS - row;
                            break;
                        }
                    }
                    heights.push(height);
                }

                let roughness = 0;
                for (let i = 0; i < heights.length - 1; i++) {
                    roughness += Math.abs(heights[i] - heights[i + 1]);
                }
                score -= roughness * 3;

                return score;
            }

            async function makeAIMove() {
                if (!gameStarted || gameOver || !currentPiece || aiThinking) return;

                aiThinking = true;
                const bestMove = findBestMove();

                if (!bestMove) {
                    aiThinking = false;
                    return;
                }

                for (let r = 0; r < bestMove.rotation; r++) {
                    rotatePiecePC();
                    await new Promise(resolve => setTimeout(resolve, 30));
                }

                const targetX = bestMove.x;
                const moveDirection = targetX > currentPiece.x ? 1 : -1;
                const movesNeeded = Math.abs(targetX - currentPiece.x);

                for (let i = 0; i < movesNeeded; i++) {
                    movePiece(moveDirection, 0);
                    await new Promise(resolve => setTimeout(resolve, 20));
                }

                setTimeout(() => {
                    if (currentPiece && gameStarted && !gameOver) {
                        hardDrop();
                    }
                    aiThinking = false;
                }, 50);
            }

            function startAIMode() {
                if (fallInterval) clearInterval(fallInterval);
                resetLockTimer();
                clearAllIntervals();
                deactivateLaser(); // Выключаем лазер при включении AI

                board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                score = 0;
                gameOver = false;
                gameStarted = true;
                aiMode = true;
                keyState = {};

                updateScore();
                nextPiece = randomPiece();
                spawnNewPiece();
                updateFallInterval();
                updateButtonText();

                if (aiInterval) clearInterval(aiInterval);
                aiInterval = setInterval(() => {
                    if (gameStarted && !gameOver && currentPiece && !aiThinking) {
                        makeAIMove();
                    }
                }, 200);

                render();
            }

            function stopAIMode() {
                aiMode = false;
                if (aiInterval) {
                    clearInterval(aiInterval);
                    aiInterval = null;
                }
                aiThinking = false;
            }

            function detectDeviceType() {
                isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            }

            function getEffectiveSpeedForControls() {
                if (!gameStarted) return COMFORT_SPEED;
                return Math.min(speedMultiplier, COMFORT_SPEED);
            }

            function getRotationSensitivity() {
                const effectiveSpeed = getEffectiveSpeedForControls();
                return Math.max(15, BASE_ROTATION_SENSITIVITY / effectiveSpeed);
            }

            function getMoveInterval() {
                const effectiveSpeed = getEffectiveSpeedForControls();
                return Math.max(10, BASE_MOVE_INTERVAL / effectiveSpeed);
            }

            function clearAllIntervals() {
                if (horizontalInterval) {
                    clearInterval(horizontalInterval);
                    horizontalInterval = null;
                }
                if (softDropInterval) {
                    clearInterval(softDropInterval);
                    softDropInterval = null;
                }
            }

            function restartHorizontalInterval() {
                if (horizontalInterval) {
                    clearInterval(horizontalInterval);
                    horizontalInterval = null;
                }

                if (!currentPiece || gameOver || !gameStarted || aiMode) return;

                const direction = keyState['ArrowLeft'] ? -1 : (keyState['ArrowRight'] ? 1 : 0);
                if (direction !== 0) {
                    movePiece(direction, 0);

                    horizontalInterval = setInterval(() => {
                        if (!currentPiece || gameOver || !gameStarted || aiMode || (!keyState['ArrowLeft'] && !keyState['ArrowRight'])) {
                            clearInterval(horizontalInterval);
                            horizontalInterval = null;
                            return;
                        }
                        const currentDirection = keyState['ArrowLeft'] ? -1 : (keyState['ArrowRight'] ? 1 : 0);
                        if (currentDirection !== 0) {
                            movePiece(currentDirection, 0);
                        }
                    }, getMoveInterval());
                }
            }

            function restartSoftDropInterval() {
                if (softDropInterval) {
                    clearInterval(softDropInterval);
                    softDropInterval = null;
                }

                if (!currentPiece || gameOver || !gameStarted || aiMode || !keyState['ArrowDown']) return;

                movePiece(0, 1);

                softDropInterval = setInterval(() => {
                    if (!currentPiece || gameOver || !gameStarted || aiMode || !keyState['ArrowDown']) {
                        clearInterval(softDropInterval);
                        softDropInterval = null;
                        return;
                    }
                    movePiece(0, 1);
                }, getMoveInterval() * 0.8);
            }

            function setupKeyboardControls() {
                let spacePressed = false;
                let lastRotateTime = 0;
                const PC_ROTATION_COOLDOWN = 30;

                window.addEventListener('keydown', (e) => {
                    const key = e.key;
                    const isV = key === 'v' || e.altKey;

                    // Клавиша V нажата - включаем лазерный режим (удерживание)
                    if (key === 'v' || key === 'V') {
                        e.preventDefault();

                        if (aiMode) {
                            alert('Выключите 🤖 перед использованием лазера!');
                            return;
                        }

                        if (!vPressed) {  // используем новую переменную vPressed
                            vPressed = true;

                            // Включаем лазерный режим через V
                            if (!laserModeEnabled) {
                                laserModeEnabled = true;
                                laserActiveByV = true;  // новая переменная
                                updateLaserToggleButton();
                                if (laserIndicator) {
                                    laserIndicator.style.display = 'block';
                                }

                                // Ставим курсор по центру при включении
                                laserCursorX = Math.floor(COLS / 2);
                                laserCursorY = Math.floor(ROWS / 2);
                                render();
                            }
                        }
                        return;
                    }

                    // Клавиша L как запасной вариант вкл/выкл
                    if (key === 'l' || key === 'L') {
                        e.preventDefault();
                        if (aiMode) {
                            alert('Выключите Робота перед использованием лазера!');
                            return;
                        }
                        toggleLaserMode();
                        if (laserModeEnabled) {
                            laserCursorX = Math.floor(COLS / 2);
                            laserCursorY = Math.floor(ROWS / 2);
                        }
                        return;
                    }

                    // Если игра не активна - выходим
                    if (!gameStarted || gameOver || !currentPiece || aiMode) {
                        return;
                    }

                    // Если лазерный режим включен - управляем прицелом стрелками
                    if (laserModeEnabled) {
                        // Управление прицелом стрелками
                        if (key === 'ArrowLeft') {
                            e.preventDefault();
                            laserCursorX = Math.max(0, laserCursorX - 1);
                            render();
                            return;
                        }
                        if (key === 'ArrowRight') {
                            e.preventDefault();
                            laserCursorX = Math.min(COLS - 1, laserCursorX + 1);
                            render();
                            return;
                        }
                        if (key === 'ArrowUp') {
                            e.preventDefault();
                            laserCursorY = Math.max(0, laserCursorY - 1);
                            render();
                            return;
                        }
                        if (key === 'ArrowDown') {
                            e.preventDefault();
                            laserCursorY = Math.min(ROWS - 1, laserCursorY + 1);
                            render();
                            return;
                        }

                        // Стрельба по пробелу
                        if (key === ' ' || key === 'Space') {
                            e.preventDefault();
                            fireLaser(laserCursorX, laserCursorY);
                            return;
                        }

                        // Остальные клавиши игнорируем в лазерном режиме
                        if (key.startsWith('Arrow')) {
                            e.preventDefault();
                            return;
                        }
                    }

                    // Стандартная обработка клавиш для управления фигурой (только если лазер выключен)
                    if (key.startsWith('Arrow') || key === ' ') {
                        e.preventDefault();
                    }

                    if (key === ' ' || key === 'Space') {
                        if (!spacePressed) {
                            spacePressed = true;
                            hardDrop();
                        }
                        return;
                    }

                    if (key === 'ArrowUp') {
                        if (isTouchDevice) {
                            rotatePieceMobile();
                        } else {
                            const now = Date.now();
                            if (now - lastRotateTime > PC_ROTATION_COOLDOWN) {
                                rotatePiecePC();
                                lastRotateTime = now;
                            }
                        }
                        return;
                    }

                    if (key === 'ArrowLeft' || key === 'ArrowRight' || key === 'ArrowDown') {
                        if (keyState[key]) return;

                        keyState[key] = true;

                        if (key === 'ArrowLeft' || key === 'ArrowRight') {
                            restartHorizontalInterval();
                        } else if (key === 'ArrowDown') {
                            restartSoftDropInterval();
                        }
                    }
                });

                window.addEventListener('keyup', (e) => {
                    const key = e.key;

                    // Клавиша V отпущена - выключаем лазерный режим
                    if (key === 'v' || key === 'V') {
                        e.preventDefault();

                        if (vPressed) {
                            vPressed = false;

                            // Выключаем лазерный режим только если он был включен через V
                            if (laserActiveByV && laserModeEnabled) {
                                laserModeEnabled = false;
                                laserActiveByV = false;
                                updateLaserToggleButton();
                                if (laserIndicator) {
                                    laserIndicator.style.display = 'none';
                                }
                                deactivateLaser();
                                render();
                            }
                        }
                        return;
                    }

                    if (key === ' ' || key === 'Space') {
                        spacePressed = false;
                        e.preventDefault();
                        return;
                    }

                    if (key === 'ArrowLeft' || key === 'ArrowRight' || key === 'ArrowDown') {
                        keyState[key] = false;

                        if (key === 'ArrowLeft' || key === 'ArrowRight') {
                            if (keyState['ArrowLeft'] || keyState['ArrowRight']) {
                                restartHorizontalInterval();
                            } else {
                                if (horizontalInterval) {
                                    clearInterval(horizontalInterval);
                                    horizontalInterval = null;
                                }
                            }
                        } else if (key === 'ArrowDown') {
                            if (softDropInterval) {
                                clearInterval(softDropInterval);
                                softDropInterval = null;
                            }
                        }
                    }
                });

                window.addEventListener('blur', () => {
                    keyState = {};
                    spacePressed = false;
                    clearAllIntervals();

                    // Сбрасываем v-лазер при потере фокуса
                    if (laserActiveByV) {
                        laserModeEnabled = false;
                        laserActiveByV = false;
                        altPressed = false;
                        updateLaserToggleButton();
                        if (laserIndicator) {
                            laserIndicator.style.display = 'none';
                        }
                        deactivateLaser();
                        render();
                    }
                });

                window.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        keyState = {};
                        spacePressed = false;
                        clearAllIntervals();

                        // Сбрасываем V-лазер при потере фокуса
                        if (laserActiveByV) {
                            laserModeEnabled = false;
                            laserActiveByV = false;
                            vPressed = false;
                            updateLaserToggleButton();
                            if (laserIndicator) {
                                laserIndicator.style.display = 'none';
                            }
                            deactivateLaser();
                            render();
                        }
                    }
                });
            }

            function setupTouchControls() {
                const canvas = boardCanvas;

                let touchStartX = 0, touchStartY = 0;
                let touchStartTime = 0;
                const LONG_TAP_DELAY = 200;

                // Обработка мыши для ПК (лазер)
                canvas.addEventListener('mousemove', (e) => {
                    if (!laserModeEnabled || aiMode || !gameStarted || gameOver) return;

                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;

                    const mouseX = (e.clientX - rect.left) * scaleX;
                    const mouseY = (e.clientY - rect.top) * scaleY;

                    const col = Math.floor(mouseX / BLOCK_SIZE);
                    const row = Math.floor(mouseY / BLOCK_SIZE);

                    if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
                        laserCursorX = col;
                        laserCursorY = row;
                        render();
                    }
                });

                // Стрельба по нажатию левой кнопки мыши
                canvas.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return; // Только левая кнопка

                    if (!laserModeEnabled || aiMode || !gameStarted || gameOver) return;

                    e.preventDefault();

                    // Активируем режим стрельбы мышью
                    mouseLaserActive = true;

                    // Немедленный выстрел
                    fireLaser(laserCursorX, laserCursorY);
                });

                // Стрельба при движении с зажатой кнопкой
                canvas.addEventListener('mousemove', (e) => {
                    if (!mouseLaserActive || !laserModeEnabled || aiMode || !gameStarted || gameOver) return;

                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;

                    const mouseX = (e.clientX - rect.left) * scaleX;
                    const mouseY = (e.clientY - rect.top) * scaleY;

                    const col = Math.floor(mouseX / BLOCK_SIZE);
                    const row = Math.floor(mouseY / BLOCK_SIZE);

                    if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
                        // Если позиция изменилась - стреляем
                        if (col !== laserCursorX || row !== laserCursorY) {
                            laserCursorX = col;
                            laserCursorY = row;
                            fireLaser(laserCursorX, laserCursorY);
                            render();
                        }
                    }
                });

                // Отпускание кнопки мыши
                canvas.addEventListener('mouseup', (e) => {
                    if (e.button !== 0) return;
                    mouseLaserActive = false;
                });

                // При выходе мыши за пределы канваса
                canvas.addEventListener('mouseleave', () => {
                    mouseLaserActive = false;
                });

                // Существующий touch-код
                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();

                    if (!gameStarted || gameOver || aiMode) return;

                    const touch = e.touches[0];
                    touchStartX = touch.clientX;
                    touchStartY = touch.clientY;
                    touchStartTime = Date.now();

                    isDragging = false;
                    dragStartX = touchStartX;
                    dragStartY = touchStartY;
                    lastMoveX = touchStartX;
                    lastMoveY = touchStartY;
                    accumulatedRotation = 0;
                    dragMode = null;

                    // Активируем лазер если режим включен
                    if (laserModeEnabled) {
                        activateLaser(touch.clientX, touch.clientY);
                    }

                    keyState = {};
                    clearAllIntervals();
                }, { passive: false });

                canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();

                    const touch = e.touches[0];
                    const currentX = touch.clientX;
                    const currentY = touch.clientY;

                    // Обновляем позицию лазера
                    if (laserModeEnabled && isLaserActive) {
                        updateLaserPosition(currentX, currentY);
                        return; // В лазерном режиме блокируем другое управление
                    }

                    if (!currentPiece || gameOver || !gameStarted || aiMode) return;

                    if (!isDragging) {
                        const diffX = Math.abs(currentX - dragStartX);
                        const diffY = Math.abs(currentY - dragStartY);

                        if (diffX > 20 || diffY > 20) {
                            isDragging = true;
                            if (diffX > diffY) {
                                dragMode = 'horizontal';
                            } else {
                                dragMode = 'vertical';
                            }
                            lastMoveX = currentX;
                            lastMoveY = currentY;
                        }
                    }

                    if (isDragging) {
                        const rect = canvas.getBoundingClientRect();
                        const pixelPerBlock = rect.width / COLS;

                        if (dragMode === 'horizontal') {
                            const deltaX = currentX - lastMoveX;
                            const blockDelta = Math.round(deltaX / (pixelPerBlock * 0.7));

                            if (blockDelta !== 0) {
                                movePiece(blockDelta, 0);
                                lastMoveX = currentX;
                            }
                            lastMoveY = currentY;

                        } else if (dragMode === 'vertical') {
                            const deltaY = currentY - lastMoveY;

                            if (deltaY < -3) {
                                accumulatedRotation += Math.abs(deltaY);

                                const rotationThreshold = 40;

                                if (accumulatedRotation > rotationThreshold) {
                                    rotatePieceMobile();
                                    accumulatedRotation = 0;
                                    lastMoveY = currentY;
                                }
                            } else {
                                accumulatedRotation = 0;
                                lastMoveY = currentY;
                            }
                            lastMoveX = currentX;
                        }
                    }
                }, { passive: false });

                canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();

                    // Деактивируем лазер
                    if (laserModeEnabled && isLaserActive) {
                        deactivateLaser();
                        return;
                    }

                    if (!gameStarted || gameOver || aiMode) return;

                    if (!touchStartX) return;

                    const touchEnd = e.changedTouches[0];
                    const diffX = touchEnd.clientX - touchStartX;
                    const diffY = touchEnd.clientY - touchStartY;
                    const timeDiff = Date.now() - touchStartTime;

                    const speed = Math.sqrt(diffX * diffX + diffY * diffY) / timeDiff;

                    if (isDragging) {
                        if (swipeDownEnabled && diffY > 70 && speed > 0.5) {
                            hardDrop();
                        }
                        isDragging = false;
                        dragMode = null;
                        touchStartX = 0;
                        return;
                    }

                    if (timeDiff >= LONG_TAP_DELAY && Math.abs(diffX) < 15 && Math.abs(diffY) < 15) {
                        if (swipeDownEnabled) {
                            hardDrop();
                        }
                        touchStartX = 0;
                        return;
                    }

                    if (speed > 0.25) {
                        if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 25) {
                            if (diffX > 0) movePiece(1, 0);
                            else movePiece(-1, 0);
                        }
                        else if (diffY < -20) {
                            rotatePieceMobile();
                        }
                        else if (swipeDownEnabled && diffY > 45) {
                            hardDrop();
                        }
                    }
                    else if (Math.abs(diffX) < 25 && Math.abs(diffY) < 25) {
                        const rect = canvas.getBoundingClientRect();
                        const touchX = touchEnd.clientX - rect.left;

                        if (touchX < rect.width / 3) {
                            movePiece(-1, 0);
                        } else if (touchX > (rect.width / 3) * 2) {
                            movePiece(1, 0);
                        } else {
                            rotatePieceMobile();
                        }
                    }

                    touchStartX = 0;
                    isDragging = false;
                    dragMode = null;
                }, { passive: false });

                canvas.addEventListener('touchcancel', (e) => {
                    e.preventDefault();
                    if (laserModeEnabled && isLaserActive) {
                        deactivateLaser();
                    }
                    touchStartX = 0;
                    isDragging = false;
                    dragMode = null;
                });

                canvas.addEventListener('contextmenu', (e) => e.preventDefault());
            }

            function setupSpeedControls() {
                document.getElementById('speedUp').addEventListener('click', (e) => {
                    e.preventDefault();
                    increaseSpeed();
                });

                document.getElementById('speedDown').addEventListener('click', (e) => {
                    e.preventDefault();
                    decreaseSpeed();
                });
            }

            function renderStartScreen() {
                ctx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);

                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        ctx.strokeStyle = '#20273f';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                    }
                }

                ctx.globalAlpha = 0.9;
                ctx.fillStyle = '#1a1f2f';
                ctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
                ctx.globalAlpha = 1.0;

                ctx.fillStyle = '#ffe484';
                ctx.font = 'bold 40px system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('ТЕТРИС', 400, 600);

                ctx.font = '40px system-ui, sans-serif';
                ctx.fillStyle = '#a9b7d4';
                ctx.fillText('Выберите скорость', 400, 750);

                ctx.font = '30px system-ui, sans-serif';
                ctx.fillStyle = '#7b88aa';
                ctx.fillText('Нажмите "Новая игра"', 400, 830);

                nextCtx.clearRect(0, 0, 140, 140);
                nextCtx.fillStyle = '#323d5e';
                nextCtx.fillRect(0, 0, 140, 140);
                nextCtx.fillStyle = '#7b88aa';
                nextCtx.font = '14px system-ui, sans-serif';
                nextCtx.textAlign = 'center';
                nextCtx.fillText('ждем', 70, 75);
                nextCtx.fillText('старта', 70, 95);
            }

            function render() {
                if (!gameStarted && !gameOver) {
                    renderStartScreen();
                    return;
                }

                ctx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);

                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        const cell = board[row][col];
                        if (cell !== 0) {
                            ctx.fillStyle = cell;
                            ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                            ctx.fillStyle = 'rgba(255,255,255,0.2)';
                            ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE - 4, 4);
                        } else {
                            ctx.strokeStyle = '#20273f';
                            ctx.lineWidth = 1;
                            ctx.strokeRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                        }
                    }
                }

                if (currentPiece && !gameOver && gameStarted) {
                    ctx.fillStyle = currentPiece.color;
                    for (let r = 0; r < currentPiece.matrix.length; r++) {
                        for (let c = 0; c < currentPiece.matrix[0].length; c++) {
                            if (currentPiece.matrix[r][c] !== 0) {
                                const x = (currentPiece.x + c) * BLOCK_SIZE;
                                const y = (currentPiece.y + r) * BLOCK_SIZE;
                                ctx.fillRect(x, y, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                                ctx.fillRect(x, y, BLOCK_SIZE - 8, 4);
                                ctx.fillStyle = currentPiece.color;
                            }
                        }
                    }
                }

                // Рисуем прицел лазера если режим активен
                if (laserModeEnabled && gameStarted && !gameOver && !aiMode) {
                    const targetX = laserCursorX * BLOCK_SIZE + BLOCK_SIZE / 2;
                    const targetY = laserCursorY * BLOCK_SIZE + BLOCK_SIZE / 2;

                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 3;
                    ctx.shadowColor = '#ff0000';
                    ctx.shadowBlur = 10;

                    // Рисуем перекрестие
                    ctx.beginPath();
                    ctx.moveTo(targetX - 15, targetY);
                    ctx.lineTo(targetX + 15, targetY);
                    ctx.moveTo(targetX, targetY - 15);
                    ctx.lineTo(targetX, targetY + 15);
                    ctx.stroke();

                    // Рисуем окружность
                    ctx.beginPath();
                    ctx.arc(targetX, targetY, 20, 0, Math.PI * 2);
                    ctx.stroke();

                    // Рисуем небольшие точки для эффекта
                    ctx.fillStyle = '#ff0000';
                    ctx.shadowBlur = 5;
                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2;
                        const x = targetX + Math.cos(angle) * 25;
                        const y = targetY + Math.sin(angle) * 25;
                        ctx.beginPath();
                        ctx.arc(x, y, 3, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    ctx.shadowBlur = 0;
                    ctx.shadowColor = 'transparent';
                }

                if (gameOver) {
                    ctx.globalAlpha = 0.7;
                    ctx.fillStyle = '#330000';
                    ctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
                    ctx.globalAlpha = 1.0;
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 36px system-ui, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', 400, 800);
                }

                nextCtx.clearRect(0, 0, 140, 140);
                if (nextPiece && gameStarted) {
                    const matrix = nextPiece.matrix;
                    const color = nextPiece.color;
                    const blockSize = 30;
                    const offsetX = (140 - matrix[0].length * blockSize) / 2;
                    const offsetY = (140 - matrix.length * blockSize) / 2;

                    for (let r = 0; r < matrix.length; r++) {
                        for (let c = 0; c < matrix[0].length; c++) {
                            if (matrix[r][c]) {
                                nextCtx.fillStyle = color;
                                nextCtx.fillRect(offsetX + c * blockSize, offsetY + r * blockSize, blockSize - 2, blockSize - 2);
                            }
                        }
                    }
                } else if (!gameStarted) {
                    nextCtx.fillStyle = '#323d5e';
                    nextCtx.fillRect(0, 0, 140, 140);
                    nextCtx.fillStyle = '#7b88aa';
                    nextCtx.font = '14px system-ui, sans-serif';
                    nextCtx.textAlign = 'center';
                    nextCtx.fillText('ждем', 70, 75);
                    nextCtx.fillText('старта', 70, 95);
                }
            }

            function initGame() {
                detectDeviceType();

                gameStarted = false;
                gameOver = false;
                render();
                updateButtonText();
                updateSwipeToggleButton();
                updateLaserToggleButton();

                setupTouchControls();
                setupKeyboardControls();
                setupSpeedControls();

                // Добавляем обработчик для кнопки переключения свайпа
                if (swipeToggleBtn) {
                    swipeToggleBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        toggleSwipeDown();
                    });
                }

                // Добавляем обработчик для кнопки лазера
                if (laserToggleBtn) {
                    laserToggleBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        toggleLaserMode();
                    });
                }

                // Добавляем обработчик изменения размера окна
                window.addEventListener('resize', () => {
                    resizeCanvas();
                });

                // Добавляем обработчик ориентации экрана
                window.addEventListener('orientationchange', () => {
                    setTimeout(resizeCanvas, 100);
                });

                // Добавляем обработчик скролла для Яндекс.Браузера
                if (isYandexBrowser) {
                    window.addEventListener('scroll', () => {
                        resizeCanvas();
                    }, { passive: true });

                    yandexBrowserFix();
                }

                resetBtn.addEventListener('click', () => {
                    if (aiMode) stopAIMode();
                    if (laserModeEnabled) deactivateLaser();

                    if (!gameStarted && !gameOver) {
                        startGame();
                    } else if (gameStarted && !gameOver) {
                        resetGame();
                    } else if (gameOver) {
                        startGame();
                    }
                });

                aiBtn.addEventListener('click', () => {
                    if (aiMode) {
                        stopAIMode();
                        resetGame();
                    } else {
                        // Выключаем лазер при включении AI
                        if (laserModeEnabled) {
                            laserModeEnabled = false;
                            updateLaserToggleButton();
                            deactivateLaser();
                        }
                        startAIMode();
                    }
                    updateButtonText();
                });

                updateSpeedDisplay();

                // Первоначальная настройка размера canvas
                setTimeout(resizeCanvas, 50);
                setTimeout(resizeCanvas, 200);
                setTimeout(resizeCanvas, 500);
            }

            window.addEventListener('load', initGame);
        })();
    </script>
</body>
